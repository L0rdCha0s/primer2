services:
  db:
    build:
      context: ./docker/postgres
    environment:
      POSTGRES_DB: primerlab
      POSTGRES_USER: primerlab
      POSTGRES_PASSWORD: primerlab
    ports:
      - "5432:5432"
    volumes:
      - primerlab_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U primerlab -d primerlab"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  primerlab_pgdata:
